# Layer 1: File Descriptor and Socket Buffer Limits
# Applied by scripts/apply-layer-1.sh (copied to /etc/sysctl.d/99-nginx-perf.conf).
# Each connection is a file descriptor; at high concurrency the FD ceiling and
# the socket accept queues are the first hard walls you hit.

# System-wide maximum number of open file descriptors (number of FDs).
# Default is memory-derived (~ a few hundred k). 2,097,152 = 2^21 headroom for
# ~2M concurrent connections on this single host.
fs.file-max = 2097152

# Max FDs a single process may allocate (number of FDs). Must be >= the per-user
# nofile limit we set for nginx; otherwise the soft/hard ulimit can't take effect.
fs.nr_open = 2097152

# Max length of the completed-connection (accept) queue per listening socket
# (number of connections). Default 4096. Nginx's listen backlog can't exceed this.
net.core.somaxconn = 65535

# Max packets queued on the NIC ingress side when the kernel can't process them
# fast enough (number of packets). Default 1000. Prevents drops under burst.
net.core.netdev_max_backlog = 65535

# Max queued half-open (SYN_RECV) connections awaiting the 3-way handshake
# completion (number of connections). Default 1024. Raises SYN-flood headroom.
net.ipv4.tcp_max_syn_backlog = 65535

# How long a socket stays in FIN-WAIT-2 before being forcibly closed (seconds).
# Default 60. Lower frees ephemeral ports faster under high churn.
net.ipv4.tcp_fin_timeout = 15

# Allow reusing a TIME_WAIT socket for a new outbound connection when safe
# (boolean: 1 = on). Critical for proxies making many upstream connections.
net.ipv4.tcp_tw_reuse = 1
