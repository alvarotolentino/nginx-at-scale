# Hugepages for DPDK
# Applied by scripts/apply-layer-8.sh. Hugepages reduce TLB misses for DPDK's
# large packet memory pools — essential for line-rate poll-mode drivers.

# Number of 2MB hugepages to reserve at the kernel level (count of pages).
# 2048 × 2MB = 4GB reserved for DPDK. Default: 0.
vm.nr_hugepages = 2048

# GID permitted to allocate from the hugetlb SHM pool (group id). 0 = root.
vm.hugetlb_shm_group = 0

# Adjust nr_hugepages to available RAM. Formula:
#   nr_hugepages = target_dpdk_memory_GB * 512        (since 1GB / 2MB = 512)
# 4GB (2048 pages) is a safe starting point on T2/T3; raise for higher RX/TX ring counts.
