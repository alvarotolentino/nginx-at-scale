# Layer 2: Linux TCP/IP Stack Tuning
# Appended to /etc/sysctl.d/99-nginx-perf.conf by scripts/apply-layer-2.sh.
# Layer 1 raised the connection *count* ceiling; Layer 2 tunes the *behavior* of
# each connection — buffer autosizing, congestion control, keepalive economy.

# Per-socket receive buffer: min / default / max (bytes).
# Default: 4096 131072 6291456. Raising max to 16MB lets the kernel autotune the
# window up to high bandwidth-delay-product links (25/100 GbE) without manual sizing.
net.ipv4.tcp_rmem = 4096 87380 16777216

# Per-socket send buffer: min / default / max (bytes).
# Default: 4096 16384 4194304. 16MB max matches tcp_rmem for symmetric throughput.
net.ipv4.tcp_wmem = 4096 65536 16777216

# Hard ceiling for SO_RCVBUF / SO_SNDBUF set via setsockopt (bytes).
# Default ~212992. Must be >= the tcp_rmem/tcp_wmem max above or it clamps them.
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216

# Default receive buffer for non-TCP and pre-autotune sockets (bytes).
# Default ~212992. Higher floor reduces early-connection stalls under load.
net.core.rmem_default = 262144

# Congestion control algorithm. Default: cubic. BBR models bottleneck bandwidth +
# RTT instead of reacting to loss — markedly better goodput on lossy/high-BDP paths.
net.ipv4.tcp_congestion_control = bbr

# Queueing discipline. Default: fq_codel (or pfifo_fast). BBR *requires* fq (fair
# queue) pacing to shape its sending rate correctly.
net.core.default_qdisc = fq

# Don't reset the congestion window to slow-start after an idle period (boolean).
# Default: 1 (reset). 0 keeps keepalive/HTTP-reuse connections fast after idle.
net.ipv4.tcp_slow_start_after_idle = 0

# Seconds of idle before the first keepalive probe is sent (seconds).
# Default: 7200 (2h). 60 reclaims dead connections far sooner at high concurrency.
net.ipv4.tcp_keepalive_time = 60

# Interval between keepalive probes once they start (seconds). Default: 75.
net.ipv4.tcp_keepalive_intvl = 10

# Number of unacked probes before declaring the connection dead (count). Default: 9.
net.ipv4.tcp_keepalive_probes = 6

# Enable Packetization-Layer Path MTU Discovery (0=off,1=on-when-needed,2=always).
# Default: 0. 1 lets TCP probe for a larger MTU when ICMP is blackholed — common
# in cloud/overlay networks — avoiding wedged connections.
net.ipv4.tcp_mtu_probing = 1
