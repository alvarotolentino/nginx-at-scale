#!/usr/sbin/nft -f
# =============================================================================
# Target-node firewall — minimal attack surface for the bare-metal benchmark box.
# Default-drop inbound; only SSH (22), HTTP (80), HTTPS (443) are reachable from
# the network. The backend (8080) and lux (6379) bind to 127.0.0.1 and are never
# referenced here, so they are unreachable from the tester or anywhere off-box.
#
# Install: cp deploy/firewall/nftables.conf /etc/nftables.conf
#          systemctl enable --now nftables   (install-target.sh does this)
# Inspect: nft list ruleset
#
# NOTE: SSH stays open so you don't lock yourself out. Restrict `tcp dport 22`
# to your admin source IP in production (e.g. `ip saddr 203.0.113.0/24 tcp dport 22`).
# =============================================================================

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority filter; policy drop;

        # Loopback: backend <-> lux <-> nginx all talk over 127.0.0.1.
        iif "lo" accept
        # Drop spoofed loopback from a real interface.
        iif != "lo" ip  daddr 127.0.0.0/8 drop
        iif != "lo" ip6 daddr ::1         drop

        # Stateful: let replies and ongoing connections through.
        ct state established,related accept
        ct state invalid drop

        # ICMP / ping — useful for the tester to verify reachability + PMTU.
        ip  protocol icmp   accept
        ip6 nexthdr  icmpv6 accept

        # The only services exposed to the network.
        tcp dport 22  accept      # SSH (restrict to admin source IP in prod)
        tcp dport 80  accept      # HTTP (redirects to 443 from Layer 5 on)
        tcp dport 443 accept      # HTTPS — the benchmark entrypoint

        # Everything else is dropped by policy.
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}
