# =============================================================================
# BASELINE — do not tune this file.
# Stock, untuned Nginx. This is the fair starting point every optimization layer
# is measured against. No gzip, no caching, no TLS, default worker_connections.
# =============================================================================

user nginx;
worker_processes auto;          # let Nginx pick (= CPU count); untuned otherwise

error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;    # stock default — deliberately low
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;

    # Upstream Rust backend (Axum on :8080).
    upstream backend {
        server backend:8080;
    }

    server {
        listen 80;
        server_name _;

        # React SPA static build lives here (Vite outputs to nginx/static,
        # mounted to /srv/static in docker-compose).
        root /srv/static;
        index index.html;

        # Reverse-proxy the API to the Rust backend.
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # SPA fallback: unknown paths return index.html so client routing works.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
