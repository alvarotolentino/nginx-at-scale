# =============================================================================
# Layer 7: NUMA & CPU Affinity Pinning.
# Extends layer-06-aio.conf. worker_processes is set to an explicit CPU count by
# apply-layer-7.sh (it sed-replaces the "auto" below), and each worker is pinned
# to a distinct CPU with worker_cpu_affinity auto.
#
# ---- Why NUMA matters -------------------------------------------------------
# On multi-socket (T2/T3) hardware, RAM is partitioned per socket (NUMA node). A
# core accessing memory on its *own* node is fast; reaching across the inter-socket
# link to the *other* node roughly doubles memory latency and pollutes caches. If a
# worker keeps migrating between cores/sockets, its working set ends up on the wrong
# node and every request pays the cross-socket tax.
#
# ---- How worker_cpu_affinity auto works -------------------------------------
# It calls sched_setaffinity() to bind worker N to CPU N (a 1:1 pin). A pinned worker
# keeps its L1/L2 cache hot and its allocations local to one NUMA node, so cache hit
# rate climbs and cross-socket traffic falls.
#
# ---- Manual vs auto ---------------------------------------------------------
# Use `auto` to spread workers across all CPUs (default for max throughput). Use a
# manual affinity mask when you want to CONFINE Nginx to a single NUMA node — e.g.
# leaving the other socket for the backend or NIC interrupts.
#
# NOTE: for strict NUMA-node binding (CPU + memory), launch Nginx under numactl:
#   numactl --cpunodebind=0 --membind=0 nginx
# apply-layer-7.sh prints the topology and documents this; re-run pinned on T3.
# =============================================================================

user nginx;
worker_processes auto;              # apply-layer-7.sh replaces "auto" with $(nproc)
worker_cpu_affinity auto;           # pin each worker to a distinct CPU (sched_setaffinity)
worker_rlimit_nofile 2097152;

error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 65535;
    use epoll;
    multi_accept on;
    accept_mutex off;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;

    # ---- compressed static delivery -----------------------------------------
    gzip on;
    gzip_static on;     # serve Vite-prebuilt .gz assets — zero runtime compression CPU
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    # brotli_static on; # enable if Nginx is built with ngx_brotli (serves .br files)

    # ---- attack-surface reduction -------------------------------------------
    server_tokens off;                  # hide nginx version from Server header + errors
    client_max_body_size 1m;            # this app has no uploads — cap request bodies

    # ---- rate limiting (opt-in, OFF by default — would cap the benchmark) ----
    limit_req_zone  $binary_remote_addr zone=api_rl:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=api_conn:10m;

    keepalive_timeout 65;
    keepalive_requests 10000;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    reset_timedout_connection on;
    client_body_timeout 10;
    send_timeout 10;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    upstream backend {
        server 127.0.0.1:8080;          # loopback-only backend on the bare-metal target
        keepalive 256;
    }

    server {
        listen 80 backlog=65535 reuseport;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl backlog=65535 reuseport;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;

        # ---- security headers (one block — child-context add_header REPLACES
        #      inherited ones, so keep them all together) ----------------------
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        root /var/www/1b-shop;
        index index.html;

        location /api/ {
            # limit_req  zone=api_rl burst=100 nodelay;   # opt-in; skews benchmark
            # limit_conn api_conn 50;                      # opt-in; skews benchmark
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            aio on;
            directio 512k;
            output_buffers 2 128k;
            aio_write on;
            try_files $uri $uri/ /index.html;
        }
    }
}
