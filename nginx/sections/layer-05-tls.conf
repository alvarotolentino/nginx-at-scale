# =============================================================================
# Layer 5: TLS Hardening & Session Resumption.
# Complete nginx.conf extending Layer 3 with TLS on :443. Targets SSL Labs A+:
# TLS 1.2/1.3 only, modern AEAD ciphers, HSTS preload, OCSP stapling, session reuse.
# =============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 2097152;

error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 65535;
    use epoll;
    multi_accept on;
    accept_mutex off;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;

    # ---- compressed static delivery -----------------------------------------
    gzip on;
    gzip_static on;     # serve Vite-prebuilt .gz assets — zero runtime compression CPU
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    # brotli_static on; # enable if Nginx is built with ngx_brotli (serves .br files)

    keepalive_timeout 65;
    keepalive_requests 10000;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    reset_timedout_connection on;
    client_body_timeout 10;
    send_timeout 10;

    # ---- TLS (shared across all servers) ------------------------------------
    ssl_protocols TLSv1.2 TLSv1.3;                 # drop TLS 1.0/1.1 (A+ requirement)
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;                 # TLS 1.3 ignores this; explicit for 1.2 — client order is fine with AEAD-only
    ssl_session_cache shared:SSL:50m;              # ~200k sessions cached across workers
    ssl_session_timeout 1d;                        # resume within a day → skip full handshake
    ssl_session_tickets off;                       # off for forward secrecy: ticket keys are a long-lived secret; cache-based resumption avoids that risk
    ssl_stapling on;                               # staple OCSP response so clients skip a CA round-trip
    ssl_stapling_verify on;

    upstream backend {
        server backend:8080;
        keepalive 256;
    }

    # ---- HTTP :80 → redirect to HTTPS ---------------------------------------
    server {
        listen 80 backlog=65535 reuseport;
        server_name _;
        return 301 https://$host$request_uri;       # force TLS
    }

    # ---- HTTPS :443 ---------------------------------------------------------
    server {
        listen 443 ssl backlog=65535 reuseport;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;

        # Security headers.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;

        root /srv/static;
        index index.html;

        location /api/ {
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
