# =============================================================================
# Layer 6: Async File I/O — kernel AIO + directio for large static assets.
# Identical to layer-05-tls.conf except the static location enables aio/directio.
# Requires libaio on the host (apply-layer-5.sh installs libaio-dev).
# =============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 2097152;

error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 65535;
    use epoll;
    multi_accept on;
    accept_mutex off;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;

    # ---- compressed static delivery -----------------------------------------
    gzip on;
    gzip_static on;     # serve Vite-prebuilt .gz assets — zero runtime compression CPU
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    # brotli_static on; # enable if Nginx is built with ngx_brotli (serves .br files)

    keepalive_timeout 65;
    keepalive_requests 10000;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    reset_timedout_connection on;
    client_body_timeout 10;
    send_timeout 10;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    upstream backend {
        server backend:8080;
        keepalive 256;
    }

    server {
        listen 80 backlog=65535 reuseport;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl backlog=65535 reuseport;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;

        root /srv/static;
        index index.html;

        location /api/ {
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            # ---- Layer 6: async file I/O for large static assets -------------
            aio on;                 # delegate file reads to kernel AIO (libaio)
            # Files larger than 512KB bypass the page cache via O_DIRECT. Threshold
            # choice: small SPA chunks (<512KB) stay on the faster cached path; only
            # big media benefits from directio. Tune up if your assets are mostly
            # large (e.g. video → 1m+), or down if you serve many ~1MB images.
            directio 512k;
            output_buffers 2 128k;  # two 128KB buffers for the directio read pipeline
            aio_write on;           # async writes too (e.g. proxy temp files)

            try_files $uri $uri/ /index.html;
        }
    }
}
