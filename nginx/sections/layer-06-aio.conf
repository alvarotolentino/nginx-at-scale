# =============================================================================
# Layer 6: Async File I/O — kernel AIO + directio for large static assets.
# Identical to layer-05-tls.conf except the static location enables aio/directio.
# Requires libaio on the host (apply-layer-5.sh installs libaio-dev).
# =============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 2097152;

error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 65535;
    use epoll;
    multi_accept on;
    accept_mutex off;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Buffered logging + fd/stat cache — folded in from tuning-extras (2026-07-05).
    access_log /var/log/nginx/access.log combined buffer=256k flush=5s;
    open_file_cache max=10000 inactive=60s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ---- compressed static delivery -----------------------------------------
    gzip on;
    gzip_static on;     # serve Vite-prebuilt .gz assets — zero runtime compression CPU
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    # brotli_static on; # enable if Nginx is built with ngx_brotli (serves .br files)

    # ---- attack-surface reduction -------------------------------------------
    server_tokens off;                  # hide nginx version from Server header + errors
    client_max_body_size 1m;            # this app has no uploads — cap request bodies

    # ---- rate limiting (opt-in, OFF by default — would cap the benchmark) ----
    limit_req_zone  $binary_remote_addr zone=api_rl:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=api_conn:10m;

    keepalive_timeout 65;
    keepalive_requests 10000;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    reset_timedout_connection on;
    client_body_timeout 10;
    send_timeout 10;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    upstream backend {
        server 127.0.0.1:8080;          # loopback-only backend on the bare-metal target
        keepalive 256;
    }

    server {
        listen 80 backlog=65535 reuseport;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl backlog=65535 reuseport;
        http2 on;                                       # separate directive (nginx 1.25.1+); `listen ... http2` is deprecated
        server_name _;

        ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;

        # ---- security headers (one block — child-context add_header REPLACES
        #      inherited ones, so keep them all together) ----------------------
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        root /var/www/1b-shop;
        index index.html;

        location /api/ {
            # limit_req  zone=api_rl burst=100 nodelay;   # opt-in; skews benchmark
            # limit_conn api_conn 50;                      # opt-in; skews benchmark
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            # ---- Layer 6: async file I/O — OPT-IN, OFF BY DEFAULT ------------
            # MEASURED ON T1 (small SPA assets, all page-cached, served over TLS):
            # enabling the block below REGRESSED throughput ~21% (wrk static
            # 290k→229k) and ~23% (warm h2 348k→268k). Reason: over HTTPS nginx
            # cannot use sendfile (the kernel can't encrypt), so every file is read
            # into a userspace buffer. Those reads are cache hits — they never block
            # — so routing them through `aio threads` only adds a thread-pool
            # dispatch (context switch + queue) per request, for zero benefit.
            # Workers then idle waiting on the handoff → CPU AND rps both drop.
            #
            # Async file I/O only pays off when reads GENUINELY BLOCK on disk:
            # large media (video, big images) or a working set bigger than RAM.
            # For that workload, uncomment the four directives below. Prefer native
            # `aio on;` if nginx is built --with-file-aio (it's gated to files
            # >=directio size, so small cached files keep the fast path); otherwise
            # `aio threads;` (needs --with-threads) applies to all reads — only a win
            # when most reads are large/blocking.
            #
            #   aio threads;            # or `aio on;` on a --with-file-aio build
            #   directio 512k;          # files >=512KB bypass page cache via O_DIRECT
            #   output_buffers 2 128k;  # two 128KB buffers for the directio pipeline
            #   aio_write on;           # async writes (e.g. proxy temp files)

            try_files $uri $uri/ /index.html;
        }
    }
}
