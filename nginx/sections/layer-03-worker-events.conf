# =============================================================================
# Layer 3: Worker & Event Model — epoll, multi_accept, tuned keepalive.
# Complete nginx.conf (not a snippet). Builds on baseline by replacing the events
# block with an epoll-based, high-fanout model and adding connection economy in http.
# =============================================================================

user nginx;
worker_processes auto;              # one worker per CPU core

# Each worker may open up to this many FDs. Must match the systemd LimitNOFILE
# and ulimit set in Layer 1, or workers cap out well below worker_connections.
worker_rlimit_nofile 2097152;

error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 65535;       # max simultaneous connections per worker
    use epoll;                      # Linux scalable event interface (O(1) readiness)
    multi_accept on;                # accept all pending connections per event loop pass
    # With multi_accept on, accept_mutex serializes accepts and adds latency. Turning
    # it off lets all workers accept concurrently — lower latency at high connection rate.
    accept_mutex off;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Buffered logging + fd/stat cache — base nginx tuning, standardized across all layer
    # configs (L3+). Synchronous per-request logging (12 workers contending on one file) and an
    # open()/fstat() per hit are real CPU at 100k+ rps; buffering the log and caching
    # open fds measured a large win on the hot static path.
    access_log /var/log/nginx/access.log combined buffer=256k flush=5s;
    open_file_cache max=10000 inactive=60s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ---- compressed static delivery -----------------------------------------
    gzip on;
    gzip_static on;     # serve Vite-prebuilt .gz assets — zero runtime compression CPU
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;  # only used for on-the-fly (proxied/dynamic) responses
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    # brotli_static on; # enable if Nginx is built with ngx_brotli (serves .br files)

    # ---- attack-surface reduction -------------------------------------------
    server_tokens off;                  # hide nginx version from Server header + errors
    client_max_body_size 1m;            # this app has no uploads — cap request bodies

    # ---- rate limiting (opt-in, OFF by default) ------------------------------
    # Zones are defined but NOT applied: enabling limit_req on the static / path would
    # cap the throughput benchmark. Apply to /api/ only if you need abuse protection
    # during non-benchmark runs (see the commented block in the /api/ location).
    limit_req_zone  $binary_remote_addr zone=api_rl:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=api_conn:10m;

    # ---- connection economy --------------------------------------------------
    keepalive_timeout 65;               # hold idle client connections 65s for reuse
    keepalive_requests 10000;           # serve up to 10k requests per kept-alive conn
    sendfile on;                        # zero-copy file → socket (skips userspace)
    tcp_nopush on;                      # coalesce headers+file into full packets (with sendfile)
    tcp_nodelay on;                     # disable Nagle for keepalive responses (low latency)
    reset_timedout_connection on;       # free memory of timed-out connections immediately
    client_body_timeout 10;             # drop slow request bodies after 10s
    send_timeout 10;                    # drop clients not reading the response within 10s

    upstream backend {
        server 127.0.0.1:8080;          # loopback-only backend on the bare-metal target
        keepalive 256;                  # pooled upstream keepalive connections
    }

    server {
        listen 80 backlog=65535 reuseport;  # large accept queue; SO_REUSEPORT for per-worker sockets
        server_name _;

        root /var/www/1b-shop;
        index index.html;

        # ---- security headers (single block — add_header in a child context
        #      REPLACES inherited ones, so keep them all together here) ---------
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        location /api/ {
            # limit_req  zone=api_rl burst=100 nodelay;   # opt-in; skews benchmark
            # limit_conn api_conn 50;                      # opt-in; skews benchmark
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";      # enable upstream keepalive
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
