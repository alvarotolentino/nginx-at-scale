# =============================================================================
# LOCAL "prod-like" image build — still dev/tester convenience, NOT the benchmark
# target (that is bare metal via scripts/install-target.sh). Use alongside the base:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Differences vs the dev stack:
#   - backend is BUILT from app/backend/Dockerfile into a small immutable image
#     (optimized release binary, no source mount)
#   - lux image pinned to a fixed tag for reproducibility
#   - restart policies for unattended operation
# Paths are relative to this dev/ dir.
# =============================================================================

services:
  lux:
    # Pin a concrete tag/digest you validate in production.
    image: ghcr.io/lux-db/lux:latest
    restart: unless-stopped

  backend:
    build:
      context: ../app/backend
      dockerfile: Dockerfile
    image: onebn-backend:prod
    # The built image has no source mount and runs the compiled binary directly.
    # BIND_ADDR/REDIS_URL are inherited from the base file's environment block.
    volumes: []
    command: null
    restart: unless-stopped

  nginx:
    restart: unless-stopped
