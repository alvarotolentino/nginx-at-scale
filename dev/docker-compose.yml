# =============================================================================
# LOCAL DEV / TESTER CONVENIENCE ONLY — *not* the tuned benchmark target.
# The real benchmark target is bare metal, provisioned by scripts/install-target.sh
# and run as systemd services (see ../README.md). Containers namespace away the very
# kernel/network tuning this project measures, so never benchmark against this stack.
#
# Use it to: iterate on the app locally, or stand up a throwaway target for the
# tester node to hit while you develop scripts/load-test.sh.
#
#   docker compose --profile build run --rm frontend-build   # build SPA
#   docker compose up -d backend nginx                       # run stack
# Paths are relative to this dev/ dir, hence the ../ prefixes into the repo root.
# =============================================================================

services:
  # One-shot: install deps and produce the static build into ../nginx/static.
  frontend-build:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../app/frontend:/app
      # Vite's outDir is ../../nginx/static (relative to app/frontend). Inside this
      # container working_dir=/app, so ../../nginx/static resolves to /nginx/static.
      # Mount the host nginx/ tree there so the build output lands on the host.
      - ../nginx:/nginx
    command: sh -c "npm install && npm run build"
    profiles: [build]

  # lux: Redis-compatible (RESP) server. The backend connects to it as a client.
  lux:
    image: ghcr.io/lux-db/lux:latest
    environment:
      # MUST bind 0.0.0.0 here — the default 127.0.0.1 is unreachable from other
      # containers. (On the bare-metal target lux is loopback-only — see lux.service.)
      LUX_BIND_HOST: "0.0.0.0"
      LUX_PORT: "6379"
      LUX_DATA_DIR: "/data"
    volumes:
      - ../data:/data
    ports:
      - "6379:6379"

  backend:
    image: rust:1-slim     # rust:1 tracks newest stable (redis→backon needs >= 1.85)
    working_dir: /app
    volumes:
      - ../app/backend:/app
    command: cargo run --release -p server
    ports:
      - "8080:8080"
    environment:
      RUST_LOG: info
      REDIS_URL: redis://lux:6379
      # Dev-only overrides of the production defaults (loopback + no CORS):
      BIND_ADDR: "0.0.0.0:8080"   # reachable from the nginx container + host port map
      CORS_DEV: "1"               # permissive CORS for the Vite dev server
    depends_on:
      - lux

  nginx:
    image: nginx:1.26-alpine
    volumes:
      - ../nginx/baseline.conf:/etc/nginx/nginx.conf:ro
      # baseline.conf serves from /var/www/1b-shop — mount the Vite output there.
      - ../nginx/static:/var/www/1b-shop:ro
    ports:
      - "80:80"
    depends_on:
      - backend
