# Local development stack. Brings up the Rust backend + baseline Nginx, and
# (via the "build" profile) compiles the React frontend into nginx/static.
#
#   docker compose --profile build run --rm frontend-build   # build SPA
#   docker compose up -d backend nginx                       # run stack

services:
  # One-shot: install deps and produce the static build into nginx/static.
  # Run with: docker compose --profile build run --rm frontend-build
  frontend-build:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./app/frontend:/app
      # Vite's outDir is ../../nginx/static (relative to app/frontend). Inside this
      # container working_dir=/app, so ../../nginx/static resolves to /nginx/static.
      # Mount the host nginx/ tree there so the build output lands on the host.
      - ./nginx:/nginx
    command: sh -c "npm install && npm run build"
    profiles: [build]

  # lux: Redis-compatible (RESP) server. The backend connects to it as a client.
  # Configured entirely via LUX_* env vars (no CLI flags).
  lux:
    image: ghcr.io/lux-db/lux:latest
    environment:
      # MUST bind 0.0.0.0 — the default 127.0.0.1 is unreachable from other containers.
      LUX_BIND_HOST: "0.0.0.0"
      LUX_PORT: "6379"
      LUX_DATA_DIR: "/data"     # snapshots/WAL persisted to the mounted volume
    volumes:
      - ./data:/data
    ports:
      - "6379:6379"

  backend:
    # Latest stable Rust (1.x). redis→backon needs edition2024 (Cargo >= 1.85);
    # 1.82 fails to parse that manifest. `rust:1-slim` always tracks newest stable.
    image: rust:1-slim
    working_dir: /app
    volumes:
      - ./app/backend:/app
    command: cargo run --release -p server
    ports:
      - "8080:8080"
    environment:
      RUST_LOG: info
      REDIS_URL: redis://lux:6379   # point the backend at the lux service
    depends_on:
      - lux

  nginx:
    image: nginx:1.26-alpine
    volumes:
      - ./nginx/baseline.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/static:/srv/static:ro
    ports:
      - "80:80"
    depends_on:
      - backend
